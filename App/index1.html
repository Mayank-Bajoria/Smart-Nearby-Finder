<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Place Finder – Discover hospitals, banks, hotels and more around you.">
    <title>Smart Place Finder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="style1.css">
</head>

<body>

    <!-- LOADER -->
    <div id="page-loader" class="page-loader">
        <div class="loader-content">
            <div class="loader-icon"><i class="fa-solid fa-location-dot"></i></div>
            <div class="loader-text">Smart Place Finder</div>
            <div class="loader-spinner"></div>
        </div>
    </div>

    <!-- APP -->
    <div class="app-wrapper">

        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-location-dot"></i></div>
                <h1>Smart Place Finder</h1>
            </div>

            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="location-search" class="search-input" placeholder="Search city or area..."
                    autocomplete="off">
                <button id="search-btn" class="search-btn"><i class="fa-solid fa-arrow-right"></i></button>
                <div id="autocomplete-dropdown" class="autocomplete-dropdown"></div>
            </div>

            <div class="header-right">
                <button id="locate-btn" class="icon-btn" title="Use my location">
                    <i class="fa-solid fa-crosshairs"></i>
                    <span>My Location</span>
                </button>
                <button id="theme-toggle" class="icon-btn theme-btn" title="Toggle theme">
                    <i class="fa-solid fa-moon" id="theme-icon"></i>
                </button>
            </div>
        </header>

        <!-- CATEGORY BAR -->
        <nav class="category-bar">
            <div class="category-scroll">
                <button class="cat-btn" data-type="hospital" id="cat-hospital">
                    <span class="cat-icon" style="--cat-color:#ef4444"><i class="fa-solid fa-hospital"></i></span>
                    Hospitals
                </button>
                <button class="cat-btn" data-type="bank" id="cat-bank">
                    <span class="cat-icon" style="--cat-color:#3b82f6"><i
                            class="fa-solid fa-building-columns"></i></span>
                    Banks
                </button>
                <button class="cat-btn" data-type="hotel" id="cat-hotel">
                    <span class="cat-icon" style="--cat-color:#a855f7"><i class="fa-solid fa-hotel"></i></span>
                    Hotels
                </button>
                <button class="cat-btn" data-type="pharmacy" id="cat-pharmacy">
                    <span class="cat-icon" style="--cat-color:#10b981"><i class="fa-solid fa-pills"></i></span>
                    Pharmacy
                </button>
                <button class="cat-btn" data-type="school" id="cat-school">
                    <span class="cat-icon" style="--cat-color:#f59e0b"><i class="fa-solid fa-school"></i></span>
                    Schools
                </button>
            </div>
        </nav>

        <!-- MAIN -->
        <main class="main-content">

            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title-row">
                        <h2 id="sidebar-title">Nearby Places</h2>
                        <span class="results-count" id="results-count"></span>
                    </div>
                    <div class="filter-row" id="filter-row" style="display:none">
                        <input type="text" id="filter-input" class="filter-input" placeholder="Filter by name...">
                        <select id="sort-select" class="sort-select">
                            <option value="distance">📍 Nearest</option>
                            <option value="rating">⭐ Rating</option>
                            <option value="name">🔤 Name</option>
                        </select>
                    </div>
                </div>

                <div class="results-list" id="results-list">
                    <div class="empty-state" id="empty-state">
                        <i class="fa-solid fa-map-location-dot"></i>
                        <h3>Start Exploring</h3>
                        <p>Pick a category above to find nearby places.</p>
                    </div>
                </div>
            </aside>

            <!-- MAP -->
            <section class="map-section">
                <div class="map-loading-overlay" id="map-loading" style="display:none">
                    <div class="map-spinner">
                        <div class="spinner-ring"></div>
                        <p>Fetching places...</p>
                    </div>
                </div>
                <div id="map"></div>
            </section>

        </main>

        <!-- FOOTER -->
        <footer class="footer">
            <span>Powered by <a href="https://www.openstreetmap.org" target="_blank">OpenStreetMap</a> &amp; <a
                    href="https://overpass-api.de" target="_blank">Overpass API</a></span>
            <span>Data &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OSM
                    contributors</a></span>
        </footer>

    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- MODAL -->
    <div id="place-modal" class="place-modal" style="display:none">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-card">
            <button class="modal-close" id="modal-close"><i class="fa-solid fa-times"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="script1.js"></script>
</body>

</html>
