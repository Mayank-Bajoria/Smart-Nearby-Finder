<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Place Finder – Discover hospitals, restaurants, ATMs, banks, hotels and more around you using interactive maps.">
    <title>Smart Place Finder – Discover Nearby Places</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

    <!-- App Styles -->
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <!-- ===== LOADER OVERLAY ===== -->
    <div id="page-loader" class="page-loader">
        <div class="loader-content">
            <div class="loader-icon">
                <i class="fa-solid fa-location-dot"></i>
            </div>
            <div class="loader-text">Smart Place Finder</div>
            <div class="loader-spinner"></div>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="app-wrapper">

        <!-- ===== HEADER ===== -->
        <header class="header" role="banner">
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <div class="logo-text">
                        <h1>Smart Place Finder</h1>
                        <span class="logo-tagline">Discover what's around you</span>
                    </div>
                </div>
            </div>

            <div class="header-center">
                <!-- Search Bar -->
                <div class="search-bar" role="search">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input
                        type="text"
                        id="location-search"
                        class="search-input"
                        placeholder="Search city, area, or landmark..."
                        autocomplete="off"
                        aria-label="Search for a location"
                    >
                    <button id="search-btn" class="search-btn" aria-label="Search">
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    <!-- Autocomplete Dropdown -->
                    <div id="autocomplete-dropdown" class="autocomplete-dropdown" role="listbox" aria-label="Search suggestions"></div>
                </div>
            </div>

            <div class="header-right">
                <!-- Current Location Button -->
                <button id="locate-btn" class="icon-btn locate-btn" title="Use my location" aria-label="Use current location">
                    <i class="fa-solid fa-crosshairs"></i>
                    <span>My Location</span>
                </button>

                <!-- Dark/Light Mode Toggle -->
                <button id="theme-toggle" class="icon-btn theme-btn" title="Toggle theme" aria-label="Toggle dark/light mode">
                    <i class="fa-solid fa-moon" id="theme-icon"></i>
                </button>
            </div>
        </header>

        <!-- ===== CATEGORY BAR ===== -->
        <nav class="category-bar" role="navigation" aria-label="Place categories">
            <div class="category-scroll">
                <button class="cat-btn" data-type="hospital" data-label="Hospitals" id="cat-hospital" aria-pressed="false">
                    <span class="cat-icon" style="--cat-color: #ef4444;">
                        <i class="fa-solid fa-hospital"></i>
                    </span>
                    <span>Hospitals</span>
                </button>
                <button class="cat-btn" data-type="restaurant" data-label="Restaurants" id="cat-restaurant" aria-pressed="false">
                    <span class="cat-icon" style="--cat-color: #f97316;">
                        <i class="fa-solid fa-utensils"></i>
                    </span>
                    <span>Restaurants</span>
                </button>
                <button class="cat-btn" data-type="atm" data-label="ATMs" id="cat-atm" aria-pressed="false">
                    <span class="cat-icon" style="--cat-color: #22c55e;">
                        <i class="fa-solid fa-money-bill-wave"></i>
                    </span>
                    <span>ATMs</span>
                </button>
                <button class="cat-btn" data-type="bank" data-label="Banks" id="cat-bank" aria-pressed="false">
                    <span class="cat-icon" style="--cat-color: #3b82f6;">
                        <i class="fa-solid fa-building-columns"></i>
                    </span>
                    <span>Banks</span>
                </button>
                <button class="cat-btn" data-type="hotel" data-label="Hotels" id="cat-hotel" aria-pressed="false">
                    <span class="cat-icon" style="--cat-color: #a855f7;">
                        <i class="fa-solid fa-hotel"></i>
                    </span>
                    <span>Hotels</span>
                </button>
                <button class="cat-btn" data-type="toilets" data-label="Public Toilets" id="cat-toilets" aria-pressed="false">
                    <span class="cat-icon" style="--cat-color: #06b6d4;">
                        <i class="fa-solid fa-restroom"></i>
                    </span>
                    <span>Toilets</span>
                </button>
                <button class="cat-btn" data-type="pharmacy" data-label="Pharmacies" id="cat-pharmacy" aria-pressed="false">
                    <span class="cat-icon" style="--cat-color: #10b981;">
                        <i class="fa-solid fa-pills"></i>
                    </span>
                    <span>Pharmacy</span>
                </button>
                <button class="cat-btn" data-type="school" data-label="Schools" id="cat-school" aria-pressed="false">
                    <span class="cat-icon" style="--cat-color: #f59e0b;">
                        <i class="fa-solid fa-school"></i>
                    </span>
                    <span>Schools</span>
                </button>
            </div>
        </nav>

        <!-- ===== MAIN CONTENT AREA ===== -->
        <main class="main-content" role="main">

            <!-- ===== SIDEBAR ===== -->
            <aside class="sidebar" aria-label="Search results">

                <!-- Sidebar Header with Controls -->
                <div class="sidebar-header">
                    <div class="sidebar-title-row">
                        <h2 class="sidebar-title" id="sidebar-title">Nearby Places</h2>
                        <span class="results-count" id="results-count"></span>
                    </div>

                    <!-- Filter Row -->
                    <div class="filter-row" id="filter-row" style="display:none">
                        <!-- Name Filter -->
                        <div class="filter-search-wrap">
                            <i class="fa-solid fa-filter"></i>
                            <input
                                type="text"
                                id="filter-input"
                                class="filter-input"
                                placeholder="Filter by name..."
                                aria-label="Filter results by name"
                            >
                            <button id="clear-filter" class="clear-filter-btn" aria-label="Clear filter" style="display:none">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>

                        <!-- Sort -->
                        <div class="sort-wrap">
                            <select id="sort-select" class="sort-select" aria-label="Sort results">
                                <option value="distance">📍 Nearest</option>
                                <option value="rating">⭐ Rating</option>
                                <option value="name">🔤 Name</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Results List -->
                <div class="results-list" id="results-list" role="list">
                    <!-- Welcome State -->
                    <div class="empty-state" id="empty-state">
                        <div class="empty-illustration">
                            <i class="fa-solid fa-map-location-dot"></i>
                        </div>
                        <h3>Start Exploring</h3>
                        <p>Select a category above or search for a location to discover nearby places.</p>
                    </div>
                </div>

            </aside>

            <!-- ===== MAP AREA ===== -->
            <section class="map-section" aria-label="Interactive map">
                <!-- Map Stats Overlay -->
                <div class="map-overlay-stats" id="map-stats" style="display:none">
                    <span id="stat-category"><i class="fa-solid fa-circle-dot"></i> <span id="stat-cat-label">-</span></span>
                    <span class="stat-divider">|</span>
                    <span id="stat-count"><i class="fa-solid fa-list"></i> <span id="stat-count-val">0</span> places</span>
                </div>

                <!-- Loading Overlay on Map -->
                <div class="map-loading-overlay" id="map-loading" style="display:none">
                    <div class="map-spinner">
                        <div class="spinner-ring"></div>
                        <p>Fetching places...</p>
                    </div>
                </div>

                <!-- Leaflet Map -->
                <div id="map" aria-label="Map showing nearby places"></div>
            </section>

        </main>

        <!-- ===== FOOTER ===== -->
        <footer class="footer" role="contentinfo">
            <span>Powered by <a href="https://www.openstreetmap.org" target="_blank" rel="noopener">OpenStreetMap</a> &amp; <a href="https://overpass-api.de" target="_blank" rel="noopener">Overpass API</a></span>
            <span>Data &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap contributors</a></span>
        </footer>

    </div><!-- end .app-wrapper -->

    <!-- ===== TOAST NOTIFICATION ===== -->
    <div id="toast" class="toast" role="alert" aria-live="polite"></div>

    <!-- ===== PLACE DETAIL MODAL ===== -->
    <div id="place-modal" class="place-modal" role="dialog" aria-modal="true" aria-label="Place details" style="display:none">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-card">
            <button class="modal-close" id="modal-close" aria-label="Close details">
                <i class="fa-solid fa-times"></i>
            </button>
            <div class="modal-content" id="modal-content"></div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <!-- Main App Script -->
    <script src="script1.js"></script>
</body>
</html>
